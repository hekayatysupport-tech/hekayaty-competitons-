# Railway / Render Deployment Config for API Server
# This file is used when deploying the api-server separately

[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server build"

[deploy]
  startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
  healthcheckPath = "/api/health"
